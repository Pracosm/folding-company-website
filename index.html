<html lang="en">
<head>
<meta charset="utf-8" />

<title>The Folding Company — Packaging that folds at the speed of a sentence.</title>
<meta name="description" content="The world's first text-to-3D packaging studio. Describe a box in one sentence and Genie folds a press-ready dieline, render and mockup in 90 seconds. Built at IIT Madras, shipping from Chennai." />
<meta name="theme-color" content="#041713" />
<meta property="og:type" content="website" />
<meta property="og:title" content="The Folding Company" />
<meta property="og:description" content="Packaging that folds at the speed of a sentence. Text-to-3D packaging, press-ready in 90 seconds." />
<meta property="og:site_name" content="The Folding Company" />
<meta name="twitter:card" content="summary_large_image" />

<!-- preload the hero backgrounds so they start downloading before React runs
     (poster = desktop video first frame; hero-bg = mobile still) -->
<link rel="preload" as="image" href="assets/hero-poster.jpg" />
<link rel="preload" as="image" href="assets/hero-bg.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  html,body{font-family:'Geist','Inter',system-ui,-apple-system,sans-serif;color:#041713;background:#FFFFFF;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{overflow-x:hidden}
  img{max-width:100%;display:block}

  /* ---- uniform section rhythm: same padding everywhere, so the gap
         between any two sections is identical while scrolling ---- */
  section:not(#top):not(#m-top):not(#footer){padding-top:56px !important;padding-bottom:56px !important}
  #footer{padding-top:56px !important}

  /* ---- scroll reveal (Lumio-style: gentle slide-up from below + fade,
         staggered per element via --d, GPU-composited) ---- */
  .reveal{opacity:0;transform:translate3d(0,44px,0);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);transition-delay:var(--d,0ms);will-change:opacity,transform}
  .reveal.in{opacity:1;transform:translate3d(0,0,0)}
  @media (prefers-reduced-motion: reduce){.reveal{opacity:1;transform:none;transition:none}}

  /* ---- hero scroll flow: content rises toward you + fades as you scroll ---- */
  #top .lumio-hero{will-change:opacity,transform}

  /* ---- hover states ---- */
  .hov-raise{transition:transform .28s cubic-bezier(.16,1,.3,1),box-shadow .28s ease}
  .hov-raise:hover{transform:translateY(-4px);box-shadow:0 18px 40px -16px rgba(4,23,19,.22)}
  .hov-chip{cursor:pointer;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease,background-color .2s ease}
  .hov-chip:hover{transform:translateY(-1px);box-shadow:0 4px 14px -6px rgba(4,23,19,.18)}
  .hov-btn{cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,opacity .2s ease}
  .hov-btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px -10px rgba(4,23,19,.35)}
  .hov-btn:active{transform:translateY(0) scale(.98)}
  .flink{transition:color .18s ease,opacity .18s ease}
  .flink:hover{opacity:.72}

  /* ---- awards marquee ---- */
  .marquee{overflow:hidden;width:100%}
  .marquee-track{display:flex;width:max-content;animation:marquee 32s linear infinite}
  .marquee:hover .marquee-track{animation-play-state:paused}
  @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion: reduce){.marquee-track{animation:none}}

  /* ===================================================================
     real-website behavior layer — toasts, modals, sticky nav, forms
     =================================================================== */
  .fc-prompt{outline:none;caret-color:#1CD1AD;cursor:text;border-radius:7px;transition:box-shadow .2s ease;padding:1px 3px;margin:-1px -3px}
  .fc-prompt:hover{box-shadow:0 0 0 1px rgba(28,209,173,.30)}
  .fc-prompt:focus{box-shadow:0 0 0 2px rgba(28,209,173,.45)}

  /* single-row infinite shape carousel (auto-scrolls; no snap so motion is continuous) */
  .fc-shape-rail{overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none;padding:10px 2px 16px;-webkit-overflow-scrolling:touch}
  .fc-shape-rail::-webkit-scrollbar{display:none}
  .fc-shape-rail>div{flex:0 0 200px}
  @media (max-width:520px){.fc-shape-rail>div{flex-basis:62vw}}

  /* toasts */
  .fc-toasts{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:10050;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none}
  .fc-toast{pointer-events:auto;display:flex;align-items:center;gap:10px;background:#041713;color:#fff;font-family:'Geist',system-ui,sans-serif;font-size:13.5px;font-weight:500;letter-spacing:-0.01em;padding:11px 16px 11px 14px;border-radius:13px;box-shadow:0 16px 38px -12px rgba(4,23,19,.55),0 0 0 1px rgba(255,255,255,.07) inset;opacity:0;transform:translateY(12px) scale(.96);transition:opacity .32s ease,transform .42s cubic-bezier(.16,1,.3,1);max-width:min(92vw,440px)}
  .fc-toast.in{opacity:1;transform:none}
  .fc-toast .fc-dot{width:7px;height:7px;border-radius:50%;background:#1CD1AD;flex-shrink:0;box-shadow:0 0 0 3px rgba(28,209,173,.25)}
  .fc-toast .fc-ico{font-family:'Material Symbols Rounded';font-size:18px;line-height:1;color:#1CD1AD;flex-shrink:0;font-variation-settings:'FILL' 1}
  .fc-toast .fc-spin{width:13px;height:13px;border-radius:50%;border:2px solid rgba(28,209,173,.3);border-top-color:#1CD1AD;flex-shrink:0;animation:fcspin .7s linear infinite}
  @keyframes fcspin{to{transform:rotate(360deg)}}

  /* modal */
  .fc-overlay{position:fixed;inset:0;z-index:10040;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(4,23,19,.46);backdrop-filter:blur(8px);opacity:0;transition:opacity .28s ease}
  .fc-overlay.in{opacity:1}
  .fc-modal{background:#fff;border:1px solid #ECEAE4;border-radius:22px;box-shadow:0 40px 90px -30px rgba(4,23,19,.6);width:100%;max-width:440px;box-sizing:border-box;transform:translateY(14px) scale(.97);opacity:0;transition:transform .36s cubic-bezier(.16,1,.3,1),opacity .3s ease;font-family:'Geist',system-ui,sans-serif;overflow:hidden}
  .fc-overlay.in .fc-modal{transform:none;opacity:1}
  .fc-modal.fc-wide{max-width:860px}
  .fc-x{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:9px;border:none;background:rgba(4,23,19,.06);color:#5B6664;font-family:'Material Symbols Rounded';font-size:19px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s ease,color .18s ease;z-index:2}
  .fc-x:hover{background:rgba(4,23,19,.12);color:#041713}
  .fc-field{width:100%;box-sizing:border-box;border:1px solid #E4E1DA;border-radius:11px;padding:13px 14px;font-family:'Geist',system-ui,sans-serif;font-size:14.5px;color:#041713;background:#FAFAF9;transition:border-color .18s ease,box-shadow .18s ease;outline:none}
  .fc-field:focus{border-color:#1CD1AD;box-shadow:0 0 0 3px rgba(28,209,173,.18);background:#fff}
  .fc-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;box-sizing:border-box;background:#041713;color:#fff;border:none;border-radius:11px;padding:13px;font-family:'Geist',system-ui,sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:transform .18s ease,box-shadow .2s ease}
  .fc-primary:hover{transform:translateY(-1px);box-shadow:0 12px 26px -10px rgba(4,23,19,.5)}
  .fc-primary:active{transform:translateY(0) scale(.99)}
  .fc-ghost{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;box-sizing:border-box;background:#fff;color:#1A1108;border:1px solid #E4E1DA;border-radius:11px;padding:12px;font-family:'Geist',system-ui,sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .18s ease,border-color .18s ease}
  .fc-ghost:hover{background:#FAFAF9;border-color:#D6D2C8}

  /* demo player */
  .fc-player{position:relative;aspect-ratio:16/9;background:radial-gradient(ellipse 70% 70% at 50% 40%,#0c322a,#041713);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .fc-play{width:74px;height:74px;border-radius:50%;border:none;background:rgba(255,255,255,.92);color:#041713;font-family:'Material Symbols Rounded';font-size:36px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 14px 40px -10px rgba(0,0,0,.5);transition:transform .2s ease}
  .fc-play:hover{transform:scale(1.06)}
  .fc-scrub{position:absolute;left:18px;right:18px;bottom:16px;height:5px;border-radius:99px;background:rgba(255,255,255,.22);overflow:hidden}
  .fc-scrub i{display:block;height:100%;width:0;background:#1CD1AD;border-radius:99px}

  /* sticky header — mirrors the hero nav exactly, on a dark frosted bar */
  .fc-stick{position:fixed;top:0;left:0;right:0;z-index:10030;display:flex;justify-content:center;background:rgba(4,23,19,.82);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 10px 34px -22px rgba(0,0,0,.7);transform:translateY(-102%);transition:transform .38s cubic-bezier(.16,1,.3,1)}
  .fc-stick.in{transform:none}
  .fc-mnav{display:none}
  @media (max-width:640px){
    .fc-mnav{position:fixed;top:0;left:0;right:0;z-index:10030;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;box-sizing:border-box;background:rgba(4,23,19,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.10);box-shadow:0 12px 34px -22px rgba(0,0,0,.8);transform:translateY(-110%);transition:transform .38s cubic-bezier(.16,1,.3,1)}
    .fc-mnav.in{transform:none}
  }
  @media (max-width:720px){.fc-stick-pill{display:none !important}}

  /* =====================================================================
     FEATURE-CARD INFOGRAPHIC MOTION — ambient loops confined to the
     visual area of each card (the headings/body/buttons stay static).
     Same keyframe pattern as the rest of the site; all motion is
     switched off under prefers-reduced-motion at the bottom.
     ===================================================================== */

  /* 1 — Genie: floating prompt bubble, typewriter text, twinkling spark */
  .fc-genie-bubble{animation:fc-float 5s ease-in-out infinite;will-change:transform}
  .fc-type{display:inline-block;overflow:hidden;white-space:nowrap;vertical-align:bottom;border-right:2px solid #1CD1AD;animation:fc-type 5s steps(44,end) infinite,fc-caret .8s step-end infinite}
  .fc-cursor{display:inline-block;width:2px;height:1.05em;margin-left:2px;background:#1CD1AD;vertical-align:text-bottom;animation:fc-blink .8s step-end infinite}
  .fc-twinkle{pointer-events:none;color:#1CD1AD;animation:fc-twinkle 3.2s ease-in-out infinite;will-change:transform,opacity}
  @keyframes fc-float{0%,100%{transform:translateY(-3px)}50%{transform:translateY(3px)}}
  @keyframes fc-type{0%{width:0}55%,100%{width:44ch}}
  @keyframes fc-caret{0%,100%{border-right-color:#1CD1AD}50%{border-right-color:transparent}}
  @keyframes fc-blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes fc-twinkle{0%,100%{opacity:.2;transform:scale(.7) rotate(0deg)}50%{opacity:.95;transform:scale(1.1) rotate(90deg)}}

  /* 2 — Library: a green selection ring hops cube to cube; all cubes bob */
  .fc-cubegrid>div{animation:fc-bob 4s ease-in-out infinite,fc-select 6s ease-in-out infinite;will-change:transform}
  .fc-cubegrid>div:nth-child(1){animation-delay:0s,0s}
  .fc-cubegrid>div:nth-child(2){animation-delay:.25s,1s}
  .fc-cubegrid>div:nth-child(3){animation-delay:.5s,2s}
  .fc-cubegrid>div:nth-child(4){animation-delay:.75s,3s}
  .fc-cubegrid>div:nth-child(5){animation-delay:1s,4s}
  .fc-cubegrid>div:nth-child(6){animation-delay:1.25s,5s}
  @keyframes fc-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes fc-select{0%,15%{border-color:#1CD1AD;box-shadow:#1CD1AD55 0 0 0 3px,#04171314 0 2px 7px}21%,100%{border-color:#E2E7EE;box-shadow:#1A11080A 0 1px 2px}}

  /* 3 — Genie 2.0: the iso tetrahedron floats & rocks, shadow breathes */
  .fc-tetra{transform-box:fill-box;transform-origin:center;animation:fc-tetra 5s ease-in-out infinite;will-change:transform}
  .fc-tetra-shadow{transform-box:fill-box;transform-origin:center;animation:fc-tshadow 5s ease-in-out infinite}
  @keyframes fc-tetra{0%,100%{transform:translateY(2px) rotate(-1.5deg)}50%{transform:translateY(-8px) rotate(1.5deg)}}
  @keyframes fc-tshadow{0%,100%{transform:scaleX(1);opacity:.38}50%{transform:scaleX(.8);opacity:.22}}

  /* 4 — Speed: a light sheen sweeps the green card; the bolt pulses */
  .fc-speed{position:relative}
  .fc-speed::after{content:"";position:absolute;top:0;left:-65%;width:55%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.38),transparent);transform:skewX(-18deg);pointer-events:none;animation:fc-sheen 5s ease-in-out infinite}
  @keyframes fc-sheen{0%{left:-65%}35%,100%{left:135%}}
  .fc-pulse{transform-box:fill-box;transform-origin:center;animation:fc-pulse 2.4s ease-in-out infinite}
  @keyframes fc-pulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.14)}}

  /* 5 — Materials: a highlight wave passes across the swatches in turn */
  .fc-swatches>div{animation:fc-wave 3s ease-in-out infinite;will-change:transform,filter}
  .fc-swatches>div:nth-child(1){animation-delay:0s}
  .fc-swatches>div:nth-child(2){animation-delay:.16s}
  .fc-swatches>div:nth-child(3){animation-delay:.32s}
  .fc-swatches>div:nth-child(4){animation-delay:.48s}
  .fc-swatches>div:nth-child(5){animation-delay:.64s}
  .fc-swatches>div:nth-child(6){animation-delay:.8s}
  .fc-swatches>div:nth-child(7){animation-delay:.96s}
  .fc-swatches>div:nth-child(8){animation-delay:1.12s}
  @keyframes fc-wave{0%,72%,100%{filter:brightness(1);transform:translateY(0)}84%{filter:brightness(1.22);transform:translateY(-3px)}}

  /* 6 — Export: the "selected" highlight cycles through the format chips */
  .fc-formats>div:nth-child(1){--cd:0s}
  .fc-formats>div:nth-child(2){--cd:1.2s}
  .fc-formats>div:nth-child(3){--cd:2.4s}
  .fc-formats>div:nth-child(4){--cd:3.6s}
  .fc-formats>div:nth-child(5){--cd:4.8s}
  .fc-formats>div{animation:fc-cycle 6s ease-in-out infinite;animation-delay:var(--cd,0s)}
  .fc-formats>div>div{animation:fc-cycletext 6s ease-in-out infinite;animation-delay:var(--cd,0s)}
  @keyframes fc-cycle{0%,11%{background-color:#041713;border-color:#041713}17%,100%{background-color:#F5F5F4;border-color:#E7E7E5}}
  @keyframes fc-cycletext{0%,11%{color:#fff}17%,100%{color:#5C5C5C}}

  /* ★ Genie hero moment — a flat dieline folds up into a 3D package,
     spins, then unfolds and loops. Real CSS 3D (preserve-3d hinges). */
  /* Genie brand mark — single asset, recolors to currentColor via mask */
  .genie-logo{display:inline-block;flex-shrink:0;background-color:currentColor;-webkit-mask:url(assets/genie-logo.svg) center/contain no-repeat;mask:url(assets/genie-logo.svg) center/contain no-repeat}

  /* drifting gradient blobs (Genie "Try Genie" card bg — same green palette) */
  .fc-blobs{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .fc-blob{position:absolute;border-radius:50%;filter:blur(28px);opacity:.5;will-change:transform}
  .fc-blob.b1{width:150px;height:150px;background:#1CD1AD;left:-18px;top:34px;animation:fc-blob1 9s ease-in-out infinite}
  .fc-blob.b2{width:122px;height:122px;background:#5BDFB8;right:-14px;top:-22px;animation:fc-blob2 11s ease-in-out infinite}
  .fc-blob.b3{width:104px;height:104px;background:#BFEEE0;left:42%;bottom:-34px;animation:fc-blob3 13s ease-in-out infinite}
  @keyframes fc-blob1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(42px,22px) scale(1.15)}66%{transform:translate(22px,-16px) scale(.9)}}
  @keyframes fc-blob2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-32px,30px) scale(1.12)}66%{transform:translate(-52px,12px) scale(.95)}}
  @keyframes fc-blob3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,-22px) scale(1.2)}}

  .fold-scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;perspective:700px;pointer-events:none}
  /* the stage scales the whole rig: big while it's a closed cube, smaller
     while it's the unfolded flat dieline (which is 3x4 faces, much larger) */
  .fold-stage{position:relative;transform-style:preserve-3d;animation:fc-fold-scale 7s ease-in-out infinite}
  .fold-box{position:relative;width:112px;height:112px;transform-style:preserve-3d;transform-origin:50% 50% -56px;animation:fc-fold-spin 7s linear infinite}
  .fold-box .face{position:absolute;width:112px;height:112px;box-sizing:border-box;border:1.5px solid #0E8A72;border-radius:4px}
  .fold-base{background:linear-gradient(135deg,#D2F4EA,#86E7D2)}
  .fold-bottom{top:112px;left:0;transform-origin:50% 0%;background:linear-gradient(135deg,#5BDFB8,#1CD1AD);animation:fc-fold-bottom 7s ease-in-out infinite}
  .fold-left{left:-112px;top:0;transform-origin:100% 50%;background:linear-gradient(135deg,#86E7D2,#37D6B4);animation:fc-fold-left 7s ease-in-out infinite}
  .fold-right{left:112px;top:0;transform-origin:0% 50%;background:linear-gradient(135deg,#37D6B4,#11B393);animation:fc-fold-right 7s ease-in-out infinite}
  .fold-top{top:-112px;left:0;transform-origin:50% 100%;background:linear-gradient(135deg,#9CEAD6,#5BDFB8);transform-style:preserve-3d;animation:fc-fold-top 7s ease-in-out infinite}
  .fold-back{top:-112px;left:0;transform-origin:50% 100%;background:linear-gradient(135deg,#0E8A72,#0A6051);animation:fc-fold-back 7s ease-in-out infinite}
  @keyframes fc-fold-scale{0%,12%{transform:scale(.5)}40%,78%{transform:scale(1)}94%,100%{transform:scale(.5)}}
  @keyframes fc-fold-spin{0%{transform:rotateX(-22deg) rotateY(-18deg)}100%{transform:rotateX(-22deg) rotateY(342deg)}}
  @keyframes fc-fold-top{0%,12%{transform:rotateX(0deg)}40%,78%{transform:rotateX(90deg)}94%,100%{transform:rotateX(0deg)}}
  @keyframes fc-fold-bottom{0%,12%{transform:rotateX(0deg)}40%,78%{transform:rotateX(-90deg)}94%,100%{transform:rotateX(0deg)}}
  @keyframes fc-fold-left{0%,12%{transform:rotateY(0deg)}40%,78%{transform:rotateY(-90deg)}94%,100%{transform:rotateY(0deg)}}
  @keyframes fc-fold-right{0%,12%{transform:rotateY(0deg)}40%,78%{transform:rotateY(90deg)}94%,100%{transform:rotateY(0deg)}}
  @keyframes fc-fold-back{0%,20%{transform:rotateX(0deg)}48%,78%{transform:rotateX(90deg)}94%,100%{transform:rotateX(0deg)}}

  /* templates carousel — each shape is a true 3D model that unfolds into
     its flat dieline on hover and refolds into the shape when hover ends.
     Default = assembled 3D shape (iso view); hover = flat net (face-on,
     scaled down because the net is bigger than the folded shape). */
  .sfold-scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;perspective:700px;pointer-events:none}
  .sfold{position:relative;transform-style:preserve-3d;transform:var(--iso,none);transition:transform .65s cubic-bezier(.16,1,.3,1)}
  .fc-shape-rail > div:hover .sfold{transform:var(--isoOpen,none)}
  .sfold .f{position:absolute;box-sizing:border-box;border:1.5px solid var(--ink,#0E8A72);transform:var(--folded,none);transform-style:preserve-3d;transition:transform .65s cubic-bezier(.16,1,.3,1);backface-visibility:visible}
  .fc-shape-rail > div:hover .sfold .f{transform:var(--flat,none)}
  /* Mobile: no hover, so tapping a card adds .is-open to unfold the shape. */
  .m-shape-card.is-open .sfold{transform:var(--isoOpen,none)}
  .m-shape-card.is-open .sfold .f{transform:var(--flat,none)}
  @media (prefers-reduced-motion: reduce){.sfold,.sfold .f{transition:none}}

  @media (prefers-reduced-motion: reduce){
    .fc-genie-bubble,.fc-type,.fc-cursor,.fc-twinkle,.fc-blob,.fc-cubegrid>div,.fc-tetra,.fc-tetra-shadow,.fc-pulse,.fc-swatches>div,.fc-formats>div,.fc-formats>div>div,.fold-stage,.fold-box,.fold-box .face{animation:none}
    .fc-speed::after{animation:none;display:none}
    .fc-type{width:auto;border-right:none}
    .fold-box{transform:rotateX(-22deg) rotateY(-18deg)}
    .fold-top{transform:rotateX(90deg)}.fold-bottom{transform:rotateX(-90deg)}
    .fold-left{transform:rotateY(-90deg)}.fold-right{transform:rotateY(90deg)}.fold-back{transform:rotateX(90deg)}
  }

  /* =====================================================================
     MOBILE: below 640px the desktop app (#root) is swapped for a dedicated
     mobile app (#mroot) that mirrors the Paper frame 2TM-0 exactly.
     Desktop file + section files are untouched.
     ===================================================================== */
  #mroot{display:none}
  @media (max-width:640px){
    #root{display:none !important}
    #mroot{display:block !important}
    .fc-stick{display:none !important}     /* mobile has its own nav */
  }
</style>
</head>
<body>

<div id="root"></div>
<div id="mroot"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- pre-compiled bundle of all the JSX sections (generated by build.js).
     No in-browser Babel download, no 22 fetches — the page just loads. -->
<script src="bundle.js"></script>

<!-- interaction layer: wires the rendered design into a working site.
     Loaded with a cache-buster so edits always take effect on a normal reload. -->
<script>(function(){var s=document.createElement('script');s.src='behaviors.js?v='+Date.now();document.body.appendChild(s);})();</script>

<!-- =====================================================================
     Lumio-style scroll flow (animation layer only — no content changes).
     1) Hero content fades out + rises as you scroll down.
     2) Every section/card/heading already carries `.reveal` with a per-
        element `--d` stagger; an IntersectionObserver flips them to `.in`
        so they slide up from below as they enter the viewport.
     All work is on opacity + translate3d (GPU compositing), driven through
     requestAnimationFrame, so there's no layout thrashing.
     ===================================================================== -->
<script>
(function () {
  'use strict';
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---- 1. Hero: rise toward you + fade as the page scrolls.
       Drives both the desktop hero (#top) and the mobile hero (#m-top);
       whichever is hidden for the current breakpoint is a harmless no-op. ---- */
  (function heroFlow() {
    if (reduce) return;
    var heroes = [], ticking = false, IDS = ['top', 'm-top'];
    function collect() {
      IDS.forEach(function (id) {
        if (heroes.some(function (h) { return h.id === id; })) return;
        var sec = document.getElementById(id);
        if (!sec) return;
        var hero = sec.querySelector('.lumio-hero') || sec.lastElementChild;  // the headline/prompt block, not the studio overlay
        if (!hero) return;
        hero.classList.add('lumio-hero');
        heroes.push({ id: id, el: hero });
      });
    }
    function frame() {
      ticking = false;
      collect();
      var vh = window.innerHeight || 1;
      var p = Math.min(1, Math.max(0, window.scrollY / (vh * 0.78)));
      var e = p * p * (3 - 2 * p); // smoothstep easing
      for (var i = 0; i < heroes.length; i++) {
        if (heroes[i].el.getAttribute('data-folded')) continue;   // folded into the studio — React owns it now
        heroes[i].el.style.opacity = String(1 - e);
        heroes[i].el.style.transform = 'translate3d(0,' + (-90 * e) + 'px,0)';
      }
    }
    function onScroll() { if (!ticking) { ticking = true; requestAnimationFrame(frame); } }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    (function wait(n) {
      collect();
      if (heroes.length) frame();
      if (heroes.length < IDS.length && n < 200) setTimeout(function () { wait(n + 1); }, 50);
    })(0);
  })();

  /* ---- 2. Scroll-triggered staggered reveals via IntersectionObserver ----
     Section JSX tags major blocks/cards/headings with `.reveal` + a `--d`
     delay (≈90ms cascade); this observer flips them to `.in` as they enter
     the viewport so they slide up from below. React commits asynchronously,
     so we keep scanning briefly to catch freshly-mounted nodes. Elements
     already on screen at load fire immediately (standard IO behaviour), so
     above-the-fold content still animates in. Each element is handled once
     and its compositor hint is released after the entrance. ---- */
  (function reveals() {
    if (reduce) {
      var showAll = function () { Array.prototype.forEach.call(document.querySelectorAll('.reveal'), function (el) { el.classList.add('in'); }); };
      var t = setInterval(showAll, 120); setTimeout(function () { clearInterval(t); }, 6000);
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (!e.isIntersecting) return;
        var el = e.target;
        el.classList.add('in');
        io.unobserve(el);
        setTimeout(function () { el.style.willChange = 'auto'; }, 1200); // free the compositor
      });
    }, { rootMargin: '0px 0px -10% 0px', threshold: 0.08 });

    function scan() {
      Array.prototype.forEach.call(document.querySelectorAll('.reveal:not([data-lz])'), function (el) {
        el.setAttribute('data-lz', '1');
        io.observe(el);
      });
    }
    var n = 0, iv = setInterval(function () { scan(); if (++n > 60) clearInterval(iv); }, 100);
    scan();
  })();

  /* ---- 3. Same staggered reveals for the dedicated mobile app (#mroot):
       tag each mobile section's blocks with .reveal + a per-block --d stagger
       so they slide up from below on scroll, exactly like the desktop. ---- */
  (function mobileReveals() {
    if (reduce) return;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (!e.isIntersecting) return;
        e.target.classList.add('in');
        io.unobserve(e.target);
        setTimeout(function () { e.target.style.willChange = 'auto'; }, 1200);
      });
    }, { rootMargin: '0px 0px -8% 0px', threshold: 0.06 });
    function tag() {
      var mroot = document.getElementById('mroot');
      if (!mroot || !mroot.firstElementChild) return false;
      Array.prototype.forEach.call(mroot.firstElementChild.children, function (sec) {
        if (sec.id === 'm-top') return; // hero uses the scroll-fade above
        Array.prototype.forEach.call(sec.children, function (k, i) {
          if (k.getAttribute('data-lz')) return;
          k.setAttribute('data-lz', '1');
          k.classList.add('reveal');
          k.style.setProperty('--d', (Math.min(i, 6) * 70) + 'ms');
          io.observe(k);
        });
      });
      return true;
    }
    (function wait(n) { if (tag()) return; if (n < 200) setTimeout(function () { wait(n + 1); }, 50); })(0);
  })();
})();
</script>

</body>
</html>
